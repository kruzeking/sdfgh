<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-RAID: OVERDRIVE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; user-select: none; }
        
        #ui { 
            position: absolute; top: 30px; left: 30px; color: #0ff; z-index: 5; font-size: 18px; 
            text-shadow: 0 0 10px #0ff; display: flex; flex-direction: column; gap: 10px;
        }

        .health-container { width: 250px; height: 12px; border: 1px solid #0ff; padding: 2px; background: rgba(0, 255, 255, 0.1); }
        #health-fill { width: 100%; height: 100%; background: #0ff; transition: width 0.2s ease-out; box-shadow: 0 0 10px #0ff; }
        
        #turret-ui { color: #ffcc00; font-size: 14px; display: none; text-shadow: 0 0 8px #ffcc00; font-weight: bold; }

        .overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); padding: 40px; border: 2px solid #0ff; text-align: center; z-index: 10;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5); min-width: 350px;
        }
        h1 { color: #fff; margin-bottom: 5px; letter-spacing: 5px; font-size: 2em; }
        .sub-text { color: #0ff; font-size: 10px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .menu-section { margin-bottom: 20px; border-top: 1px solid rgba(0,255,255,0.2); padding-top: 15px; }
        .section-label { color: #fff; font-size: 12px; margin-bottom: 10px; display: block; opacity: 0.8; }
        .btn-group { display: flex; flex-direction: row; gap: 5px; justify-content: center; margin-bottom: 10px; }
        .btn { 
            background: rgba(0, 255, 255, 0.05); color: #0ff; border: 1px solid #0ff; 
            padding: 10px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; 
            font-size: 11px; transition: 0.2s; flex: 1;
        }
        .btn:hover { background: #0ff; color: #000; box-shadow: 0 0 15px #0ff; }
        .btn.active { background: #0ff; color: #000; }
        .start-btn { background: #fff; color: #000; border: none; margin-top: 10px; width: 100%; font-size: 18px; padding: 15px; cursor: pointer; }
        #pause-screen { display: none; background: rgba(0,0,0,0.85); border-color: #fff; }
        .hidden { display: none !important; }
        .key-hint { font-size: 9px; color: #555; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="ui">
        <div>CORE_INTEGRITY</div>
        <div class="health-container"><div id="health-fill"></div></div>
        <div id="turret-ui">TURRET_ACTIVE: <span id="turret-count">0</span>s</div>
        <div>LINK_TIME: <span id="score">00:00</span> | SECTOR: <span id="difficulty-label">MID</span></div>
    </div>
    
    <div id="start-screen" class="overlay">
        <h1 id="menu-title">NEON RAIDER</h1>
        <p class="sub-text" id="menu-subtext">System Initialization</p>

        <div class="menu-section">
            <span class="section-label">SECTOR INTENSITY</span>
            <div class="btn-group">
                <button class="btn" onclick="setDifficulty('LOW', this)">LOW</button>
                <button class="btn active" onclick="setDifficulty('MID', this)">MID</button>
                <button class="btn" onclick="setDifficulty('HIGH', this)">HIGH</button>
            </div>
        </div>

        <div class="menu-section">
            <span class="section-label">FLIGHT CALIBRATION</span>
            <div class="btn-group">
                <button id="invert-off" class="btn active" onclick="setInversion(false)">NORMAL ALT</button>
                <button id="invert-on" class="btn" onclick="setInversion(true)">INVERTED</button>
            </div>
            <div class="key-hint">WASD: MOVE | ARROWS: UP/DOWN</div>
        </div>

        <button class="btn start-btn" onclick="startGame()">LINK START</button>
    </div>

    <div id="pause-screen" class="overlay">
        <h1>PAUSED</h1>
        <button class="btn" style="width: 100%" onclick="togglePause()">RESUME</button>
        <button class="btn" onclick="location.reload()" style="width: 100%; margin-top:10px; border-color: #f0f; color:#f0f">ABORT</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, playerGroup, shipModel;
        let enemies = [], grenades = [], obstacles = [], portals = [], particles = [], powerups = [], playerBullets = [];
        let isPlaying = false, isPaused = false, startTime = 0, pauseOffset = 0;
        let keys = {};
        
        let targetX = 0, currentX = 0, targetY = 1.2, currentY = 1.2, targetZ = 0, currentZ = 0;
        let invertAltitude = false;
        let lastObstacleZ = -100;
        let health = 100;
        let invulnTimer = 0;
        let turretTimer = 0;

        const DIFF_SETTINGS = {
            'LOW':  { spawnRate: 0.003, aiSpeed: 0.3,  obsRate: 0.012, speed: 1.2, rareLimit: 3, pwrRate: 0.008 },
            'MID':  { spawnRate: 0.007, aiSpeed: 0.45, obsRate: 0.022, speed: 1.6, rareLimit: 5, pwrRate: 0.004 },
            'HIGH': { spawnRate: 0.015, aiSpeed: 0.65, obsRate: 0.045, speed: 2.1, rareLimit: 10, pwrRate: 0.0015 }
        };
        let currentDiff = 'MID';

        function setDifficulty(level, btn) {
            currentDiff = level;
            btn.parentElement.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('difficulty-label').innerText = level;
        }

        function setInversion(val) {
            invertAltitude = val;
            document.getElementById('invert-off').classList.toggle('active', !val);
            document.getElementById('invert-on').classList.toggle('active', val);
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            scene.fog = new THREE.FogExp2(0x020205, 0.008);
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 25);
            camera.lookAt(0, 2, 0);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            
            scene.add(new THREE.AmbientLight(0xffffff, 0.3));
            const sun = new THREE.PointLight(0x00ffff, 2, 100);
            sun.position.set(0, 20, 10);
            scene.add(sun);

            createPlayer();
            createFloor();
            
            window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code === 'Escape') togglePause(); });
            window.addEventListener('keyup', e => keys[e.code] = false);
            animate();
        }

        function buildShipMesh(mainColor, glowColor, isEnemy = false) {
            const group = new THREE.Group();
            const matMain = new THREE.MeshStandardMaterial({color: mainColor, metalness: 0.8, roughness: 0.2, emissive: isEnemy ? 0x330000 : 0x000000});
            const matGlow = new THREE.MeshBasicMaterial({color: glowColor});
            group.add(new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.6, 4), matMain));
            const cockpit = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.4, 1.5), matGlow);
            cockpit.position.set(0, 0.4, -0.5); group.add(cockpit);
            const lWing = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.15, 2), matMain);
            lWing.position.set(-1.8, -0.1, 0.5); lWing.rotation.z = 0.2; group.add(lWing);
            const rWing = lWing.clone(); rWing.position.x = 1.8; rWing.rotation.z = -0.2; group.add(rWing);
            const engineGeo = new THREE.CylinderGeometry(0.4, 0.3, 0.8, 16);
            const engL = new THREE.Mesh(engineGeo, matGlow);
            engL.rotation.x = Math.PI/2; engL.position.set(-0.7, -0.1, 2); group.add(engL);
            const engR = engL.clone(); engR.position.x = 0.7; group.add(engR);
            return group;
        }

        function createPlayer() {
            playerGroup = new THREE.Group();
            shipModel = buildShipMesh(0xcccccc, 0x00ffff);
            playerGroup.add(shipModel);
            scene.add(playerGroup);
        }

        function createFloor() {
            const grid = new THREE.GridHelper(2000, 80, 0x00ffff, 0x110011);
            grid.position.y = -1; scene.add(grid);
            scene.userData.grid = grid;
        }

        function createPowerup() {
            const isHealth = Math.random() > 0.4;
            const color = isHealth ? 0x00ff00 : 0xffcc00;
            const geo = isHealth ? new THREE.BoxGeometry(2.5, 2.5, 2.5) : new THREE.OctahedronGeometry(2);
            const mat = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 1 });
            const p = new THREE.Mesh(geo, mat);
            p.position.set((Math.random() - 0.5) * 40, 2 + Math.random() * 12, -350);
            p.userData = { type: isHealth ? 'HEALTH' : 'TURRET', hitbox: 4.5 };
            scene.add(p);
            powerups.push(p);
        }

        function spawnTurretBullet() {
            if (enemies.length === 0) return;
            let closest = null, minDist = Infinity;
            enemies.forEach(en => {
                const d = en.position.distanceTo(playerGroup.position);
                if (d < minDist) { minDist = d; closest = en; }
            });
            if (closest) {
                const b = new THREE.Mesh(new THREE.SphereGeometry(0.6), new THREE.MeshBasicMaterial({ color: 0xffcc00 }));
                b.position.copy(playerGroup.position);
                const dir = new THREE.Vector3().subVectors(closest.position, playerGroup.position).normalize();
                b.userData = { vel: dir.multiplyScalar(2.5) };
                scene.add(b);
                playerBullets.push(b);
            }
        }

        function createBuilding() {
            const w = 6 + Math.random() * 8, h = 20 + Math.random() * 30, d = 8;
            const group = new THREE.Group();
            const geom = new THREE.BoxGeometry(w, h, d);
            const mesh = new THREE.Mesh(geom, new THREE.MeshStandardMaterial({color: 0x050505, transparent: true, opacity: 0.9}));
            const line = new THREE.LineSegments(new THREE.EdgesGeometry(geom), new THREE.LineBasicMaterial({color: 0x00ffff}));
            group.add(mesh, line);
            group.position.set((Math.floor(Math.random() * 5) - 2) * 12, h/2 - 1, -300);
            scene.add(group); obstacles.push(group);
            lastObstacleZ = -300;
        }

        function createExplosion(pos, color = 0xff4400) {
            for(let i=0; i<15; i++) {
                const p = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshBasicMaterial({color: color}));
                p.position.copy(pos);
                p.userData = { vel: new THREE.Vector3((Math.random()-0.5)*0.8, (Math.random()-0.5)*0.8, (Math.random()-0.5)*0.8), life: 1.0 };
                scene.add(p); particles.push(p);
            }
        }

        function createPortalEnemy() {
            const side = Math.random() > 0.5 ? 1 : -1, x = 45 * side, y = 1 + Math.random() * 12;
            const p = new THREE.Mesh(new THREE.TorusGeometry(5, 0.2, 16, 32), new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.8 }));
            p.position.set(x, y, playerGroup.position.z - 60);
            p.rotation.y = Math.PI / 2;
            scene.add(p); portals.push({ mesh: p, timer: 30 });
            const en = new THREE.Group();
            const m = buildShipMesh(0xff0000, 0xffffff, true);
            en.add(m); en.position.set(x, y, p.position.z);
            en.userData = { timer: 0, vel: new THREE.Vector3((side * -1) * 0.4, 0, 0), targetX: 0, targetY: y, stateTimer: 0, modelRef: m };
            scene.add(en); enemies.push(en);
        }

        function takeDamage(amount) {
            if(invulnTimer > 0) return;
            health -= amount; invulnTimer = 60;
            if(health <= 0) { health = 0; gameOver(); }
            updateHealthUI();
        }

        function updateHealthUI() {
            document.getElementById('health-fill').style.width = health + "%";
            document.getElementById('health-fill').style.background = health < 30 ? "#f00" : (health < 60 ? "#ff0" : "#0ff");
        }

        function togglePause() {
            if(!isPlaying) return;
            isPaused = !isPaused;
            document.getElementById('pause-screen').style.display = isPaused ? 'block' : 'none';
            if(isPaused) pauseOffset = Date.now() - startTime;
            else startTime = Date.now() - pauseOffset;
        }

        function update() {
            if(!isPlaying || isPaused) return;
            const config = DIFF_SETTINGS[currentDiff];
            const elapsed = Date.now() - startTime;
            document.getElementById('score').innerText = Math.floor(elapsed/1000) + "s";

            if (turretTimer > 0) {
                turretTimer--;
                if (turretTimer % 10 === 0) spawnTurretBullet();
                document.getElementById('turret-ui').style.display = 'block';
                document.getElementById('turret-count').innerText = Math.ceil(turretTimer/60);
                shipModel.children[1].material.color.setHex(0xffcc00);
            } else {
                document.getElementById('turret-ui').style.display = 'none';
                shipModel.children[1].material.color.setHex(0x00ffff);
            }

            if(invulnTimer > 0) { invulnTimer--; playerGroup.visible = (invulnTimer % 10 > 5); } 
            else { playerGroup.visible = true; }

            // Player Controls
            let mx = 0, mz = 0, my = 0;
            if(keys['KeyA']) mx = -1; if(keys['KeyD']) mx = 1;
            if(keys['KeyW']) mz = -1; if(keys['KeyS']) mz = 1;
            if(keys['ArrowUp']) my = invertAltitude ? -1 : 1; 
            if(keys['ArrowDown']) my = invertAltitude ? 1 : -1;

            targetX = THREE.MathUtils.clamp(targetX + mx * 0.75, -22, 22);
            targetZ = THREE.MathUtils.clamp(targetZ + mz * 0.60, -15, 12);
            targetY = THREE.MathUtils.clamp(targetY + my * 0.50, 0.2, 18);

            currentX = THREE.MathUtils.lerp(currentX, targetX, 0.1);
            currentZ = THREE.MathUtils.lerp(currentZ, targetZ, 0.1);
            currentY = THREE.MathUtils.lerp(currentY, targetY, 0.1);

            playerGroup.position.set(currentX, currentY, currentZ);
            shipModel.rotation.z = THREE.MathUtils.lerp(shipModel.rotation.z, -mx * 0.4, 0.1);
            shipModel.rotation.x = THREE.MathUtils.lerp(shipModel.rotation.x, (mz * 0.2) + (-my * 0.2), 0.1);

            // Powerups
            if(Math.random() < config.pwrRate) createPowerup();
            for(let i = powerups.length-1; i>=0; i--) {
                const p = powerups[i];
                p.position.z += config.speed; p.rotation.y += 0.04; p.rotation.x += 0.02;
                if(p.position.distanceTo(playerGroup.position) < p.userData.hitbox) {
                    if(p.userData.type === 'HEALTH') { health = Math.min(100, health + 30); updateHealthUI(); createExplosion(p.position, 0x00ff00); }
                    else { turretTimer = 600; createExplosion(p.position, 0xffcc00); }
                    scene.remove(p); powerups.splice(i, 1);
                } else if(p.position.z > 50) { scene.remove(p); powerups.splice(i, 1); }
            }

            // Player Bullets
            for(let i = playerBullets.length-1; i>=0; i--) {
                const b = playerBullets[i];
                b.position.add(b.userData.vel);
                enemies.forEach((en, ei) => {
                    if(b.position.distanceTo(en.position) < 5) {
                        createExplosion(en.position);
                        scene.remove(en); enemies.splice(ei, 1);
                        b.position.z = 200;
                    }
                });
                if(b.position.z > 50 || b.position.z < -500) { scene.remove(b); playerBullets.splice(i, 1); }
            }

            // Obstacles Logic
            if(Math.random() < config.obsRate && lastObstacleZ > -250) createBuilding();
            lastObstacleZ += config.speed;
            const pBox = new THREE.Box3().setFromObject(playerGroup);
            for(let i = obstacles.length-1; i>=0; i--) {
                const o = obstacles[i]; o.position.z += config.speed;
                if(pBox.intersectsBox(new THREE.Box3().setFromObject(o))) { takeDamage(20); targetZ += 5; }
                if(o.position.z > 50) { scene.remove(o); obstacles.splice(i, 1); }
            }

            // Enemies Logic
            if(Math.random() < config.spawnRate && enemies.length < config.rareLimit) createPortalEnemy();
            
            for (let i = enemies.length - 1; i >= 0; i--) {
                const en = enemies[i], d = en.userData;
                
                // 1. Behavior State
                if(--d.stateTimer <= 0) { 
                    d.targetX = playerGroup.position.x + (Math.random()*20-10); 
                    d.targetY = playerGroup.position.y + (Math.random()*6-3); 
                    d.stateTimer = 60 + Math.random()*60; 
                }
                
                // 2. PREDICTIVE DODGING (Obstacles)
                const detectRange = 28; 
                for(let obs of obstacles) {
                    if (obs.position.z > en.position.z - detectRange && obs.position.z < en.position.z) {
                        const dx = en.position.x - obs.position.x;
                        const bWidth = obs.children[0].geometry.parameters.width / 2 + 2;
                        if (Math.abs(dx) < bWidth + 3) {
                            d.vel.x += dx > 0 ? 0.08 : -0.08; 
                            d.vel.y += 0.03; 
                        }
                    }
                }

                // 3. SEPARATION (Enemy-to-Enemy Collision Avoidance)
                const separationRadius = 8;
                const separationForce = 0.015;
                for (let j = 0; j < enemies.length; j++) {
                    if (i === j) continue;
                    const other = enemies[j];
                    const dist = en.position.distanceTo(other.position);
                    if (dist < separationRadius) {
                        const diff = new THREE.Vector3().subVectors(en.position, other.position);
                        diff.normalize().multiplyScalar(separationForce / (dist + 0.1));
                        d.vel.add(diff);
                    }
                }

                // 4. Apply Velocity
                d.vel.x = THREE.MathUtils.clamp(d.vel.x + (d.targetX - en.position.x) * 0.0015, -config.aiSpeed, config.aiSpeed);
                d.vel.y = THREE.MathUtils.clamp(d.vel.y + (d.targetY - en.position.y) * 0.0015, -config.aiSpeed, config.aiSpeed);
                d.vel.z = THREE.MathUtils.clamp(d.vel.z + (playerGroup.position.z - en.position.z + 10) * 0.0008, -config.aiSpeed, config.aiSpeed);
                
                en.position.add(d.vel);
                d.vel.multiplyScalar(0.96);

                // 5. Flight Banking Animation
                d.modelRef.rotation.z = THREE.MathUtils.lerp(d.modelRef.rotation.z, -d.vel.x * 2.2, 0.1);
                d.modelRef.rotation.x = THREE.MathUtils.lerp(d.modelRef.rotation.x, -d.vel.y * 1.5, 0.1);

                // 6. Physics Collision - Obstacles
                const enBox = new THREE.Box3().setFromObject(en);
                let crashed = false;
                for(let obs of obstacles) {
                    if(enBox.intersectsBox(new THREE.Box3().setFromObject(obs))) {
                        createExplosion(en.position, 0xff0000);
                        createExplosion(en.position, 0x330000);
                        scene.remove(en); 
                        enemies.splice(i, 1);
                        crashed = true;
                        break; 
                    }
                }
                if(crashed) continue;

                // 7. Combat
                if(d.timer++ % 120 === 0) {
                    const g = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshBasicMaterial({color: 0xff3300}));
                    g.position.copy(en.position);
                    const dir = new THREE.Vector3().subVectors(playerGroup.position, en.position).normalize();
                    g.userData = { vel: dir.multiplyScalar(0.8), grav: -0.002 };
                    scene.add(g); grenades.push(g);
                }
                if(en.position.z > 50) { scene.remove(en); enemies.splice(i, 1); }
            }

            // Projectiles Logic
            for(let i = grenades.length-1; i>=0; i--) {
                const g = grenades[i];
                g.position.add(g.userData.vel); g.userData.vel.y += g.userData.grav;
                if(g.position.distanceTo(playerGroup.position) < 2.5) { takeDamage(15); scene.remove(g); grenades.splice(i,1); }
                else if(g.position.z > 50) { scene.remove(g); grenades.splice(i,1); }
            }

            // Cleanup & FX
            for(let i=particles.length-1; i>=0; i--) {
                const p = particles[i]; p.position.add(p.userData.vel); p.userData.life -= 0.02; p.scale.setScalar(p.userData.life);
                if(p.userData.life <= 0) { scene.remove(p); particles.splice(i, 1); }
            }
            scene.userData.grid.position.z += config.speed; if(scene.userData.grid.position.z > 66) scene.userData.grid.position.z = 0;
            portals.forEach((p, i) => { p.timer--; p.mesh.scale.setScalar(p.timer/30); p.mesh.position.z += config.speed; if(p.timer<=0){scene.remove(p.mesh); portals.splice(i,1);}});
        }

        function gameOver() { 
            isPlaying = false; 
            document.getElementById('menu-title').innerText = "CONNECTION LOST";
            document.getElementById('menu-subtext').innerText = "Final Score: " + document.getElementById('score').innerText;
            document.getElementById('start-screen').classList.remove('hidden'); 
        }

        function startGame() {
            health = 100; invulnTimer = 0; turretTimer = 0; updateHealthUI();
            startTime = Date.now(); targetX = currentX = targetZ = currentZ = 0; targetY = currentY = 1.2;
            [enemies, obstacles, grenades, particles, powerups, playerBullets].forEach(arr => {
                 arr.forEach(obj => { if(obj.isMesh || obj.isGroup) scene.remove(obj); else if(obj.mesh) scene.remove(obj.mesh); });
            });
            enemies = []; obstacles = []; grenades = []; particles = []; powerups = []; playerBullets = []; portals = [];
            isPlaying = true; isPaused = false;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('pause-screen').style.display = 'none';
        }

        function animate() { requestAnimationFrame(animate); update(); renderer.render(scene, camera); }
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        init();
    </script>
</body>
</html>
